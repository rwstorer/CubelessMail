{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CubelessMail</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
</head>
<body>
    <main style="max-width: 420px; margin: 4rem auto; padding: 1.5rem; border: 1px solid var(--border-color); border-radius: 12px; background: var(--surface-color);">
        <h1 style="margin-bottom: 0.5rem;">Sign In</h1>
        <p class="text-muted" style="margin-bottom: 1.25rem;">Authentication is required to access CubelessMail.</p>

        {% if form.errors %}
            <div style="margin-bottom: 1rem; color: #b42318;">Invalid username or password.</div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 0.75rem;">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required autocomplete="username" autofocus style="width: 100%;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required autocomplete="current-password" style="width: 100%;">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
    </main>
</body>
</html>
