<div class="compose-fragment p-4">
    <h2>Compose</h2>

    {% if compose_error %}
        <div class="detail-pane-status">
            <p class="text-muted">{{ compose_error }}</p>
        </div>
    {% else %}
        <p class="text-small text-muted">From: {{ account.email }}</p>

        <form method="post" action="{% url 'send_message_api' %}" class="compose-form js-compose-form" enctype="multipart/form-data" data-compose-fragment-url="{% url 'compose_fragment' %}">
            {% csrf_token %}
            <div class="compose-errors" style="display:none;"></div>

            <div class="form-group compose-inline-field">
                <label for="composeTo" class="compose-inline-label">To</label>
                <input id="composeTo" type="text" name="to" value="{{ compose.to }}" required class="w-100">
            </div>

            <div class="form-group compose-inline-field">
                <label for="composeCc" class="compose-inline-label">Cc</label>
                <input id="composeCc" type="text" name="cc" value="{{ compose.cc }}" class="w-100">
            </div>

            <div class="form-group compose-inline-field">
                <label for="composeBcc" class="compose-inline-label">Bcc</label>
                <input id="composeBcc" type="text" name="bcc" value="{{ compose.bcc }}" class="w-100">
            </div>

            <div class="form-group compose-inline-field">
                <label for="composeSubject" class="compose-inline-label">Subject</label>
                <input id="composeSubject" type="text" name="subject" value="{{ compose.subject }}" maxlength="255" class="w-100">
            </div>

            <div class="form-group">
                <label for="composeTextBody">Message</label>
                <div
                    class="compose-rich-editor js-compose-editor"
                    data-initial-html="{{ compose.html_body|default:''|escape }}"
                    style="display:none;"
                ></div>
                <textarea id="composeTextBody" name="text_body" rows="10" class="w-100 js-compose-plain">{{ compose.text_body }}</textarea>
                <p class="text-small text-muted">Rich formatting is enabled when your browser supports the editor.</p>
            </div>

            <div class="form-group" style="display:none;">
                <input type="hidden" name="html_body" class="js-html-body-input" value="{{ compose.html_body }}">
                <input type="hidden" name="reply_to" value="{{ compose.reply_to }}">
                <input type="hidden" name="in_reply_to" value="{{ compose.in_reply_to }}">
                <input type="hidden" name="references" value="{{ compose.references }}">
            </div>

            <div class="form-group">
                <label for="composeAttachments">Attachments</label>
                <input id="composeAttachments" type="file" name="attachments" multiple>
                <p class="text-small text-muted">Up to 10MB per file, 25MB total.</p>
            </div>

            <div class="message-actions-toolbar" style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary">Send</button>
                {% if mobile_fallback %}
                    <a href="{% url 'inbox' %}" class="btn btn-secondary">Cancel</a>
                {% else %}
                    <button type="button" class="btn btn-secondary js-compose-cancel">Cancel</button>
                {% endif %}
            </div>
        </form>
    {% endif %}
</div>
