<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CubelessMail{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link rel="icon" type="image/svg+xml" href="{% static 'images/CubelessMail-logo.svg' %}">
    <link rel="icon" type="image/png" href="{% static 'images/CubelessMail-logo.png' %}">
</head>
<body>
    <header>
        <div class="header-row">
            <div class="header-title">
                <img src="{% static 'images/CubelessMail-logo-64.png' %}" alt="CubelessMail logo" class="header-logo">
                <h1>CubelessMail</h1>
            </div>
            <div class="header-controls">
                <button type="button" id="themeToggle" class="btn btn-secondary btn-small" title="Toggle dark mode">
                    🌙
                </button>
                <button type="button" id="sidebarToggle" class="btn btn-secondary btn-small">Hide folders</button>
            </div>
        </div>
    </header>

    <main>
        <aside class="sidebar" id="folderSidebar">
            {% block sidebar %}{% endblock %}
            <div class="sidebar-resizer" id="sidebarResizer" aria-label="Resize folders column"></div>
        </aside>

        <article class="content {% block content_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </article>
    </main>

    <script src="{% static 'js/sidebar.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
