<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubelessMail - A Lightweight Web-Based Email Client</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --surface-color: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --hover-bg: #f9f9f9;
            --active-bg: #e8f4f8;
            --active-border: #0066cc;
            --accent-color: #0066cc;
            --btn-secondary-bg: #f0f0f0;
            --btn-secondary-hover: #e8e8e8;
            --btn-secondary-text: #333333;
            --btn-secondary-border: #dddddd;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --surface-color: #2d2d2d;
            --text-color: #f0f0f0;
            --text-muted: #cccccc;
            --border-color: #404040;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --hover-bg: #3a3a3a;
            --active-bg: #4a6b7a;
            --active-border: #29d9c2;
            --accent-color: #29d9c2;
            --btn-secondary-bg: #404040;
            --btn-secondary-hover: #4a4a4a;
            --btn-secondary-text: #f0f0f0;
            --btn-secondary-border: #404040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-color);
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            background: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .app-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .app-title img {
            width: 40px;
            height: 40px;
        }

        .app-title h1 {
            font-size: 1.3rem;
            line-height: 1;
        }

        .app-header-controls {
            display: flex;
            gap: 0.5rem;
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            border: 1px solid var(--btn-secondary-border);
            border-radius: 4px;
            padding: 0.45rem 0.7rem;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
        }

        .container {
            display: flex;
            flex: 1;
            min-height: 0;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            background: var(--surface-color);
        }

        .sidebar {
            width: 250px;
            min-width: 180px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 0.9rem 0;
        }

        .sidebar-section {
            margin-bottom: 0.8rem;
        }

        .sidebar-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            letter-spacing: 0.4px;
        }

        .folder-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            margin: 0.1rem 0;
            padding: 0.75rem 1rem;
            border-left: 3px solid transparent;
            color: var(--text-color);
        }

        .folder-item:hover {
            background: var(--hover-bg);
        }

        .folder-item.active {
            background: var(--active-bg);
            border-left-color: var(--active-border);
            color: var(--active-border);
            font-weight: 600;
        }

        .folder-badge {
            color: var(--accent-color);
            font-size: 0.9em;
            font-weight: 600;
        }

        .message-list-pane {
            width: 350px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-width: 220px;
        }

        .message-list-header {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .message-list-header h2 {
            font-size: 1rem;
            margin-bottom: 0.15rem;
        }

        .message-list-header p {
            font-size: 0.84rem;
            color: var(--text-muted);
        }

        .message-list {
            overflow-y: auto;
            flex: 1;
        }

        .message-item {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .message-item:hover {
            background: var(--hover-bg);
        }

        .message-item.selected {
            background: var(--active-bg);
            border-left: 3px solid var(--active-border);
        }

        .message-item-header {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }

        .message-item-sender {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.95rem;
        }

        .message-unread-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: var(--accent-color);
            flex: 0 0 auto;
        }

        .message-starred-marker {
            color: var(--accent-color);
            font-size: 0.85rem;
            line-height: 1;
        }

        .message-item-time,
        .message-item-preview {
            color: var(--text-muted);
            font-size: 0.83rem;
        }

        .message-item-subject {
            margin-bottom: 0.3rem;
            font-size: 0.92rem;
        }

        .detail-pane {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .detail-empty {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .detail-header {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
            padding-bottom: 0.9rem;
        }

        .detail-subject {
            font-size: 1.35rem;
            margin-bottom: 0.7rem;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .detail-meta-label {
            display: block;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 0.1rem;
            color: var(--text-muted);
            letter-spacing: 0.4px;
        }

        .detail-body {
            line-height: 1.6;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 1rem;
        }

        .btn-icon {
            padding: 0.35rem 0.65rem;
            background: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .btn-icon:hover {
            background: var(--hover-bg);
            border-color: var(--active-border);
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .container {
                display: block;
            }

            .sidebar,
            .message-list-pane,
            .detail-pane {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-header-row">
            <div class="app-title">
                <img src="CubelessMail-logo-64.png" alt="CubelessMail logo">
                <h1>CubelessMail</h1>
            </div>
            <div class="app-header-controls">
                <button type="button" id="themeToggle" class="btn-secondary" title="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Folders</div>
                <div class="folder-item active">
                    <span>📥 Inbox</span>
                    <span class="folder-badge">5</span>
                </div>
                <div class="folder-item">
                    <span>⭐ Starred</span>
                </div>
                <div class="folder-item">
                    <span>✏️ Drafts</span>
                    <span class="folder-badge">2</span>
                </div>
                <div class="folder-item">
                    <span>📤 Sent</span>
                </div>
                <div class="folder-item">
                    <span>🗑️ Trash</span>
                </div>
                <div class="folder-item">
                    <span>📦 Archive</span>
                </div>
            </div>
        </div>

        <!-- Message List -->
        <div class="message-list-pane">
            <div class="message-list-header">
                <h2>INBOX</h2>
                <p>owner@company.com • static demo data</p>
            </div>
            <div class="message-list" id="messageList">
                <!-- Messages populated by JS -->
            </div>
        </div>

        <!-- Detail Pane -->
        <div class="detail-pane" id="detailPane">
            <div class="detail-empty">
                Select a message to read
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('docsTheme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', function () {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('docsTheme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('docsTheme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });

        // Mock message data
        const messages = [
            {
                id: 1,
                sender: "Owner",
                flagged: true,
                subject: "Features",
                preview: "CubelessMail is my attempt to create a Python, Django, Tailwind version of RoundCube....",
                body: "<h1>CubelessMail</h1>\n<h2>Introduction</h2>\n<p>CubelessMail is my attempt to create a Python, Django, Tailwind version of RoundCube.</p>\n<h2>Project Goals</h2>\n<ul>\n  <li>Modern web user interface<ul>\n<li>threaded emails (maybe)</li>\n<li>right-click actions (maybe)</li>\n<li>end users choose color scheme (maybe)</li>\n</ul>\n</li>\n<li>IMAPS only</li>\n<li>SMTP (secure only)\n<ul>\n<li>Implicit TLS (SMTPS)</li>\n<li>STARTTLS</li>\n</ul>\n</li>\n<li>CALDAV calendar (eventually)</li>\n<li>Contact management (eventually)</li>\n</ul>",
                from: "owner@company.com",
                date: "Apr 14, 10:32 AM",
                unread: true
            },
            {
                id: 2,
                sender: "Someone",
                flagged: false,
                subject: "Code review: Feature branch",
                preview: "Thanks for submitting the PR. I've left some comments on the implementation. Overall looking good!",
                body: "Thanks for submitting the PR!\n\nI've reviewed your feature branch and left some comments. Overall the implementation looks solid. A few suggestions:\n\n1. Consider extracting the validation logic into a separate function\n2. Add unit tests for edge cases\n3. Update the documentation\n\nGreat work! Let me know if you have questions.\n\nCheers,\nSomeone",
                from: "someone@company.com",
                date: "Apr 14, 9:15 AM",
                unread: true
            },
            {
                id: 3,
                sender: "Design Team",
                flagged: true,
                subject: "Updated mockups for dashboard redesign",
                preview: "Check out the latest iteration of the dashboard UI. We've incorporated your feedback and made some refinements...",
                body: "Hi everyone,\n\nPlease review the updated mockups in Figma. We've incorporated feedback from the last review and made several refinements:\n\n- Improved navigation hierarchy\n- Better color contrast for accessibility\n- Refined typography scale\n\nPlease leave comments directly in Figma.\n\nThanks!",
                from: "design@company.com",
                date: "Apr 13, 4:22 PM",
                unread: true
            },
            {
                id: 4,
                sender: "Quarterly Reports",
                flagged: false,
                subject: "Q1 2026 performance review reminder",
                preview: "Reminder: Please complete your Q1 2026 performance review by Friday. Access the portal here...",
                body: "This is a reminder to complete your Q1 2026 performance review by Friday, April 18.\n\nPlease log into the employee portal to submit your self-assessment.\n\nIf you need assistance, contact HR@company.com.",
                from: "hr@company.com",
                date: "Apr 13, 2:00 PM",
                unread: false
            },
            {
                id: 5,
                sender: "Notifications",
                flagged: false,
                subject: "GitHub: Your pull request was merged",
                preview: "Your pull request #1247 'Add dark mode support' has been merged to main.",
                body: "Great news!\n\nYour pull request #1247 'Add dark mode support' was approved and merged to main by @reviewer.\n\nThank you for your contribution!",
                from: "noreply@github.com",
                date: "Apr 12, 6:45 PM",
                unread: false
            }
        ];

        // Render message list
        function renderMessageList() {
            const list = document.getElementById('messageList');
            list.innerHTML = messages.map(msg => `
                <div class="message-item" onclick="selectMessage(${msg.id}, this)">
                    <div class="message-item-header">
                        <div class="message-item-sender">
                            ${msg.unread ? '<span class="message-unread-dot" aria-label="Unread" title="Unread"></span>' : ''}
                            <span>${msg.sender}</span>
                            ${msg.flagged ? '<span class="message-starred-marker" aria-label="Starred" title="Starred">&#9733;</span>' : ''}
                        </div>
                        <div class="message-item-time">${msg.date}</div>
                    </div>
                    <div class="message-item-subject">${msg.subject}</div>
                    <div class="message-item-preview">${msg.preview}</div>
                </div>
            `).join('');
        }

        // Show detail pane
        function selectMessage(id, element) {
            const msg = messages.find(m => m.id === id);
            if (!msg) return;

            const detail = document.getElementById('detailPane');
            detail.innerHTML = `
                <div class="detail-header">
                    <div class="detail-subject">${msg.subject}</div>
                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">From</div>
                            <div>${msg.sender} &lt;${msg.from}&gt;</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">Date</div>
                            <div>${msg.date}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-body">${msg.body}</div>
                <div class="detail-actions">
                    <button class="btn-icon">↩️ Reply</button>
                    <button class="btn-icon">↪️ Forward</button>
                    <button class="btn-icon">${msg.flagged ? '⭐ Flagged' : '☆ Flag'}</button>
                    <button class="btn-icon">🗑️ Delete</button>
                </div>
            `;

            // Highlight selected message
            document.querySelectorAll('.message-item').forEach(el => {
                el.classList.remove('selected');
            });
            if (element) {
                element.classList.add('selected');
            }
        }

        // Initial render
        renderMessageList();
    </script>
</body>
</html>
